<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#007bff",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0f1923",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>iOS Scan Result</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-slate-200 font-display text-slate-900 dark:text-slate-100 h-screen flex items-center justify-center">
<!-- Mobile Screen Container -->
<div class="relative w-full max-w-[430px] h-[932px] bg-slate-900 rounded-[3rem] border-[8px] border-slate-800 shadow-2xl overflow-hidden flex flex-col">
<!-- Background Mockup Content (Simulating a camera view) -->
<div class="absolute inset-0 bg-slate-800 flex items-center justify-center overflow-hidden">
<div class="w-full h-full bg-gradient-to-tr from-slate-900 via-slate-800 to-slate-900 opacity-80"></div>
<div class="absolute w-64 h-64 border-2 border-white/30 rounded-3xl flex items-center justify-center">
<span class="material-symbols-outlined text-white/20 text-8xl">qr_code_scanner</span>
</div>
<!-- Dynamic blur effect for background -->
<div class="absolute inset-0 backdrop-blur-sm"></div>
</div>
<!-- Bottom Sheet UI -->
<div class="relative flex h-full w-full flex-col justify-end">
<!-- Overlay to darken background when sheet is up -->
<div class="absolute inset-0 bg-black/40"></div>
<!-- Bottom Sheet Content -->
<div class="relative flex flex-col items-stretch bg-white dark:bg-background-dark rounded-t-xl overflow-hidden pb-10">
<!-- Handle -->
<div class="flex h-5 w-full items-center justify-center pt-2">
<div class="h-1.5 w-12 rounded-full bg-slate-300 dark:bg-slate-700"></div>
</div>
<!-- Content Area -->
<div class="flex-1 px-6 pt-8 pb-4 flex flex-col items-center">
<!-- Centered Large Icon -->
<div class="w-20 h-20 rounded-full bg-primary/10 flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-primary text-5xl">link</span>
</div>
<h3 class="text-slate-900 dark:text-slate-100 tracking-tight text-2xl font-bold leading-tight text-center">
                        Scan Successful
                    </h3>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium mt-1 mb-4 uppercase tracking-wider">
                        Website Link Detected
                    </p>
<div class="w-full bg-background-light dark:bg-slate-800/50 rounded-xl p-4 border border-slate-100 dark:border-slate-800 text-center mb-8">
<p class="text-primary font-medium break-all text-lg">
                            https://www.apple.com/ios/scan-portal-access
                        </p>
</div>
<!-- Actions -->
<div class="w-full space-y-3">
<!-- Primary Button -->
<button class="w-full flex cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-primary text-white text-lg font-bold leading-normal tracking-wide shadow-lg shadow-primary/30 active:scale-[0.98] transition-transform">
<span class="truncate">Open Link</span>
</button>
<div class="grid grid-cols-2 gap-3">
<!-- Secondary Outlined Action 1 -->
<button class="flex flex-1 cursor-pointer items-center justify-center rounded-xl h-12 px-4 border-2 border-slate-200 dark:border-slate-700 bg-transparent text-slate-700 dark:text-slate-300 text-base font-semibold transition-colors hover:bg-slate-50 dark:hover:bg-slate-800">
<span class="material-symbols-outlined mr-2 text-xl">content_copy</span>
<span>Copy</span>
</button>
<!-- Secondary Outlined Action 2 -->
<button class="flex flex-1 cursor-pointer items-center justify-center rounded-xl h-12 px-4 border-2 border-slate-200 dark:border-slate-700 bg-transparent text-slate-700 dark:text-slate-300 text-base font-semibold transition-colors hover:bg-slate-50 dark:hover:bg-slate-800">
<span class="material-symbols-outlined mr-2 text-xl">share</span>
<span>Share</span>
</button>
</div>
<!-- Cancel/Close Link -->
<button class="w-full flex cursor-pointer items-center justify-center h-12 text-slate-400 dark:text-slate-500 text-base font-medium">
                            Dismiss
                        </button>
</div>
</div>
<!-- Home Indicator (Safe Area) -->
<div class="flex justify-center pb-2">
<div class="h-1.5 w-32 rounded-full bg-slate-900/10 dark:bg-white/10"></div>
</div>
</div>
</div>
<!-- StatusBar Mock -->
<div class="absolute top-0 left-0 w-full px-8 py-4 flex justify-between items-center z-50 text-white">
<span class="text-sm font-bold">9:41</span>
<div class="flex items-center space-x-2">
<span class="material-symbols-outlined text-sm">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-sm">wifi</span>
<span class="material-symbols-outlined text-sm rotate-90">battery_full</span>
</div>
</div>
</div>
</body></html>
