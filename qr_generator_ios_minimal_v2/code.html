<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>QR Generator - Simple &amp; Fast</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#007bff",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0f1923",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Header -->
<header class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-10">
<div class="max-w-md mx-auto px-4 py-4 flex items-center justify-between">
<div class="w-10 h-10 bg-primary/10 rounded-lg flex items-center justify-center text-primary">
<span class="material-symbols-outlined">qr_code_2</span>
</div>
<h1 class="text-lg font-bold tracking-tight">QR Generator</h1>
<button class="w-10 h-10 flex items-center justify-center text-slate-500">
<span class="material-symbols-outlined">help_outline</span>
</button>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 max-w-md mx-auto w-full p-4 space-y-6">
<!-- Tabbed Interface (Input Types) -->
<div class="bg-white dark:bg-slate-900 p-1 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 flex overflow-x-auto no-scrollbar">
<button class="flex-1 flex flex-col items-center justify-center py-2 px-3 rounded-lg bg-primary text-white transition-all">
<span class="material-symbols-outlined text-[20px]">link</span>
<span class="text-[11px] font-semibold mt-1">URL</span>
</button>
<button class="flex-1 flex flex-col items-center justify-center py-2 px-3 rounded-lg text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all">
<span class="material-symbols-outlined text-[20px]">notes</span>
<span class="text-[11px] font-semibold mt-1">Text</span>
</button>
<button class="flex-1 flex flex-col items-center justify-center py-2 px-3 rounded-lg text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all">
<span class="material-symbols-outlined text-[20px]">mail</span>
<span class="text-[11px] font-semibold mt-1">Email</span>
</button>
<button class="flex-1 flex flex-col items-center justify-center py-2 px-3 rounded-lg text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all">
<span class="material-symbols-outlined text-[20px]">wifi</span>
<span class="text-[11px] font-semibold mt-1">Wi-Fi</span>
</button>
<button class="flex-1 flex flex-col items-center justify-center py-2 px-3 rounded-lg text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all">
<span class="material-symbols-outlined text-[20px]">call</span>
<span class="text-[11px] font-semibold mt-1">Phone</span>
</button>
</div>
<!-- Mode Selector -->
<div class="flex p-1 bg-slate-200/50 dark:bg-slate-800 rounded-xl">
<label class="flex-1 relative cursor-pointer group">
<input checked="" class="sr-only peer" name="qr-type" type="radio"/>
<div class="py-2 text-center rounded-lg text-sm font-medium transition-all peer-checked:bg-white dark:peer-checked:bg-slate-700 peer-checked:shadow-sm peer-checked:text-primary text-slate-600 dark:text-slate-400">
                    Static
                </div>
</label>
<label class="flex-1 relative cursor-pointer group">
<input class="sr-only peer" name="qr-type" type="radio"/>
<div class="py-2 text-center rounded-lg text-sm font-medium transition-all peer-checked:bg-white dark:peer-checked:bg-slate-700 peer-checked:shadow-sm peer-checked:text-primary text-slate-600 dark:text-slate-400">
                    Dynamic
                </div>
</label>
</div>
<!-- Input Area -->
<div class="space-y-4">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Destination URL</label>
<textarea class="w-full min-h-[160px] p-5 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 focus:ring-2 focus:ring-primary focus:border-transparent transition-all resize-none text-lg placeholder:text-slate-400" placeholder="https://your-website.com"></textarea>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="bg-white dark:bg-slate-900 p-4 rounded-xl border border-slate-200 dark:border-slate-800 flex items-center gap-3">
<div class="w-8 h-8 rounded bg-slate-900"></div>
<div>
<p class="text-[10px] uppercase tracking-wider text-slate-500 font-bold">QR Color</p>
<p class="text-xs font-medium">#000000</p>
</div>
</div>
<div class="bg-white dark:bg-slate-900 p-4 rounded-xl border border-slate-200 dark:border-slate-800 flex items-center gap-3">
<div class="w-8 h-8 rounded border border-slate-200 flex items-center justify-center">
<span class="material-symbols-outlined text-sm">add</span>
</div>
<div>
<p class="text-[10px] uppercase tracking-wider text-slate-500 font-bold">Add Logo</p>
<p class="text-xs font-medium">Optional</p>
</div>
</div>
</div>
</div>
<!-- Preview Card -->
<div class="bg-primary/5 dark:bg-primary/10 rounded-xl p-8 border-2 border-dashed border-primary/20 flex flex-col items-center justify-center text-center space-y-4">
<div class="bg-white p-4 rounded-lg shadow-xl inline-block">
<div class="w-32 h-32 bg-slate-50 rounded flex items-center justify-center border border-slate-100">
<span class="material-symbols-outlined text-4xl text-slate-300">qr_code_2</span>
</div>
</div>
<p class="text-sm text-slate-500">Enter a URL to generate your high-resolution QR code preview</p>
</div>
<!-- Primary Action -->
<button class="w-full py-4 bg-primary hover:bg-primary/90 text-white rounded-xl font-bold shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
<span>Generate QR Code</span>
<span class="material-symbols-outlined">bolt</span>
</button>
</main>
<!-- Bottom Navigation -->
<nav class="bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 pb-6 pt-2">
<div class="max-w-md mx-auto px-6 flex justify-between items-center">
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined fill-[1]">add_box</span>
<span class="text-[10px] font-bold">Create</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">history</span>
<span class="text-[10px] font-bold">History</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">analytics</span>
<span class="text-[10px] font-bold">Stats</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="text-[10px] font-bold">Settings</span>
</a>
</div>
</nav>
</body></html>
