<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>QR Generator - iOS Style</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#007bff",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0f1923",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .glass-card {
            background: rgba(0, 123, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 123, 255, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Header -->
<header class="sticky top-0 z-50 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md px-4 py-4 flex items-center justify-between border-b border-slate-200 dark:border-slate-800">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-200/50 dark:hover:bg-slate-800/50 transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back</span>
</button>
<h1 class="text-lg font-semibold tracking-tight">QR Generator</h1>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-200/50 dark:hover:bg-slate-800/50 transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">more_horiz</span>
</button>
</header>
<main class="flex-1 w-full max-w-lg mx-auto px-4 py-6 space-y-8">
<!-- Live Preview Section (Blue-tinted Glass Card) -->
<section class="flex flex-col items-center">
<div class="w-full glass-card rounded-xl p-8 flex flex-col items-center gap-6 shadow-sm">
<div class="relative w-48 h-48 bg-white rounded-lg p-4 shadow-xl flex items-center justify-center overflow-hidden">
<div class="w-full h-full bg-center bg-no-repeat bg-cover" data-alt="Modern clean QR code scanning pattern" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCD-YIHa2tYV-iFbLEcnW4aLNUa2ZPBsf1jLnFFm6G-G_2xhEUB-t1vvPHd1PqvEdZRNMua2RUjGKgWRYkY69vDKEG7OcSgnhzMecp_Rij5K4MXFiJ4r7oWkSepsZngmczv6Ho-AmOvSf_0tlYRS6KmgleTuxvspNirV3BABq_su8Qzm5UrK_TJhSAOHviFor4-mRGrIc3r6t9WLsUmOpZOkqL0NVi4Vqr697uRUaAizK5sXUef_9P41SNR6zyKCymjbrPkl_NzW0s');">
</div>
</div>
<div class="text-center space-y-1">
<p class="font-semibold text-slate-900 dark:text-slate-100">Live Preview</p>
<p class="text-sm text-slate-500 dark:text-slate-400">Updates instantly as you type</p>
</div>
<button class="w-full bg-primary text-white font-semibold py-3 px-6 rounded-xl shadow-lg shadow-primary/25 hover:bg-primary/90 active:scale-95 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]">download</span>
                    Download PNG
                </button>
</div>
</section>
<!-- Form Section -->
<section class="bg-white dark:bg-slate-900 rounded-xl p-6 shadow-sm border border-slate-100 dark:border-slate-800 space-y-6">
<div class="space-y-4">
<label class="block">
<span class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Content Type</span>
<div class="mt-2 grid grid-cols-3 gap-2 p-1 bg-slate-100 dark:bg-slate-800 rounded-lg">
<button class="bg-white dark:bg-slate-700 shadow-sm py-2 rounded-md text-sm font-medium text-primary">URL</button>
<button class="py-2 rounded-md text-sm font-medium text-slate-500 dark:text-slate-400">Text</button>
<button class="py-2 rounded-md text-sm font-medium text-slate-500 dark:text-slate-400">Wi-Fi</button>
</div>
</label>
<label class="block">
<span class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Website URL</span>
<input class="mt-2 block w-full rounded-xl border-slate-200 dark:border-slate-700 dark:bg-slate-800 focus:border-primary focus:ring focus:ring-primary/20 transition-all" placeholder="https://example.com" type="text" value="https://mywebsite.com/profile"/>
</label>
<div class="grid grid-cols-2 gap-4">
<label class="block">
<span class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Foreground</span>
<div class="mt-2 flex items-center gap-2 p-3 border border-slate-200 dark:border-slate-700 rounded-xl">
<div class="w-6 h-6 rounded-full bg-slate-900 ring-2 ring-slate-100 dark:ring-slate-800"></div>
<span class="text-xs font-mono">#000000</span>
</div>
</label>
<label class="block">
<span class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Background</span>
<div class="mt-2 flex items-center gap-2 p-3 border border-slate-200 dark:border-slate-700 rounded-xl">
<div class="w-6 h-6 rounded-full bg-white ring-2 ring-slate-100 dark:ring-slate-800"></div>
<span class="text-xs font-mono">#FFFFFF</span>
</div>
</label>
</div>
</div>
</section>
<!-- Additional Settings Card -->
<section class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-100 dark:border-slate-800 divide-y divide-slate-100 dark:divide-slate-800">
<div class="p-4 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-lg bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-[20px]">high_quality</span>
</div>
<span class="font-medium">Error Correction</span>
</div>
<span class="text-sm text-slate-500">High (30%)</span>
</div>
<div class="p-4 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-lg bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-[20px]">frame_inspect</span>
</div>
<span class="font-medium">Add Frame</span>
</div>
<div class="w-10 h-6 bg-primary rounded-full relative flex items-center px-1">
<div class="w-4 h-4 bg-white rounded-full ml-auto shadow-sm"></div>
</div>
</div>
</section>
</main>
<!-- Bottom Navigation -->
<nav class="sticky bottom-0 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-t border-slate-200 dark:border-slate-800 px-6 py-3 pb-8 flex items-center justify-between">
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined fill-1">add_circle</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Create</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">history</span>
<span class="text-[10px] font-bold uppercase tracking-wider">History</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Settings</span>
</a>
</nav>
</body></html>
