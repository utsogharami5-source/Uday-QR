<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#007bff",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0f1923",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-effect {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .scanner-frame {
            border: 2px solid rgba(0, 123, 255, 0.5);
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.3);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<!-- Header -->
<header class="fixed top-0 left-0 right-0 z-50 glass-effect border-b border-slate-200/50 px-4 py-3 flex items-center justify-between">
<button class="p-2 hover:bg-slate-100 rounded-full transition-colors">
<span class="material-symbols-outlined text-slate-900">close</span>
</button>
<h1 class="text-lg font-semibold tracking-tight">Scanner</h1>
<button class="p-2 hover:bg-slate-100 rounded-full transition-colors">
<span class="material-symbols-outlined text-primary">help</span>
</button>
</header>
<!-- Main Viewfinder Area -->
<main class="relative h-screen w-full bg-slate-900 flex flex-col items-center justify-center overflow-hidden">
<!-- Mock Camera Feed Background -->
<div class="absolute inset-0 z-0">
<img alt="Document on a clean white desk" class="w-full h-full object-cover opacity-80" data-alt="Document on a clean white desk surface" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCsOwhbubb-Qy5bJ9RFAWczilbREdBlhS2IoYjhOM_wPxtqI0nFb5KV1gbl-pkaVVtFHB3ez60KgPfV0Z8VoEs-h_ycYH9j75NaxcDqsO5DYVORmavwQKe0sEV_v7g97fGHQrGbgy1m42pFqxasZoeQDkrAtHeu2U0EMMLjc_49p_VQL2lirPtzbrPlvbU9Zbcc_JMYYZq1dTu7s8txw8xOjT0b5KxWcFFR_YaJzD-1dTCktiGhXtspK0HcEwfcUM-c5sqMNhMuIVc"/>
</div>
<!-- Scanner Overlay -->
<div class="relative z-10 w-4/5 aspect-[3/4] max-w-md rounded-lg scanner-frame flex flex-col items-center justify-center">
<div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-primary rounded-tl-lg"></div>
<div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-primary rounded-tr-lg"></div>
<div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-primary rounded-bl-lg"></div>
<div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-primary rounded-br-lg"></div>
<p class="text-white font-medium bg-black/20 backdrop-blur-md px-4 py-2 rounded-full text-sm">Position document in frame</p>
</div>
<!-- Camera Controls -->
<div class="absolute bottom-32 z-20 w-full flex items-center justify-evenly px-8">
<button class="size-12 rounded-full glass-effect flex items-center justify-center text-slate-900 shadow-lg border border-white/20">
<span class="material-symbols-outlined">image</span>
</button>
<button class="size-20 rounded-full bg-white p-1 shadow-2xl border-4 border-primary/20">
<div class="size-full rounded-full border-2 border-slate-200 flex items-center justify-center">
<div class="size-14 rounded-full bg-white border-2 border-slate-100"></div>
</div>
</button>
<button class="size-12 rounded-full glass-effect flex items-center justify-center text-slate-900 shadow-lg border border-white/20">
<span class="material-symbols-outlined">flash_on</span>
</button>
</div>
</main>
<!-- Bottom Sheet / Navigation -->
<footer class="fixed bottom-0 left-0 right-0 z-50">
<div class="glass-effect rounded-t-xl border-t border-slate-200/50 shadow-[0_-10px_40px_rgba(0,0,0,0.05)]">
<!-- Pull Handle -->
<div class="flex justify-center py-2">
<div class="w-10 h-1 rounded-full bg-slate-300"></div>
</div>
<!-- Content Area (Preview or Quick Actions) -->
<div class="px-6 pb-6">
<div class="flex items-center gap-4 py-2">
<div class="size-16 rounded-lg bg-slate-100 overflow-hidden border border-slate-200">
<img alt="Last scanned document thumbnail" class="w-full h-full object-cover" data-alt="Miniature preview of a scanned white document" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBlAfITI7HoUM3GFPRyyKuvvRsj_sQ2iIrodC22O6oRSR0xIzbJHdPfdYw6QdMezSbtDz3HcUrNCjkw0_rcimT2LmK5Pvs9IX4xYP0s5-AvioD-V-hJAMImmy_Hifs1S7RhWP0UHDPs5OqZYTThq61JvbyfafLicO3OWDlw7UKnNWzw9OxqpXI9efqLuoo8Exj0nplwhjN5Bqu8x21cjzI36jrVNotB3j_pyvHDYGDHLdL193t2x1h0weZHcaljgYW5yl9YiQqW4SY"/>
</div>
<div>
<h3 class="font-bold text-slate-900">New Scan</h3>
<p class="text-xs text-slate-500 uppercase tracking-wider font-semibold">Ready to process</p>
</div>
<button class="ml-auto bg-primary text-white px-6 py-2 rounded-full font-bold text-sm shadow-md shadow-primary/20">
                        Process
                    </button>
</div>
</div>
<!-- Navigation Bar Component -->
<div class="flex gap-2 border-t border-slate-100 bg-white/80 px-4 pb-8 pt-2">
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">home</span>
</div>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-primary" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">document_scanner</span>
</div>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">history</span>
</div>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">settings</span>
</div>
</a>
</div>
</div>
</footer>
</body></html>
